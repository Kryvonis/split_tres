# Make Bluetooth stronger
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n

# Enable deep sleep
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=360000

# ZMK Studio
CONFIG_ZMK_STUDIO=y

# Enable USB CDC ACM for serial console
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_CDC_ACM=y

# Enable logging for debugging split connection
# CONFIG_LOG=y
# CONFIG_ZMK_LOG_LEVEL_DBG=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_POSITION_QUEUE_SIZE=10
# CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_POSITION_QUEUE_SIZE=10

# Enable Display
CONFIG_ZMK_DISPLAY=y
